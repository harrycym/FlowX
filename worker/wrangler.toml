name = "nimbusglide-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
SUPABASE_URL = "https://zduzcyamdnepufjxbnwe.supabase.co"
SUPABASE_JWT_SECRET = ""  # Set via `wrangler secret put SUPABASE_JWT_SECRET`

# Secrets (set via wrangler secret put):
# GROQ_API_KEY
# SUPABASE_SERVICE_ROLE_KEY
# SUPABASE_JWT_SECRET

# Durable Object for atomic demo rate limiting
[durable_objects]
bindings = [
  { name = "DEMO_RATE_LIMITER", class_name = "DemoRateLimiter" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DemoRateLimiter"]
